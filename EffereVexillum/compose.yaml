services:
  backendserver:
    image: backendserver
    build:
      context: ./BackendServer
      dockerfile: ./Dockerfile
    ports:
      - "9002:8080"
    environment:
      - Minio__Endpoint=minio:9000
      - Minio__AccessKey=minioadmin
      - Minio__SecretKey=minioadmin
      - Minio__Secure=false
    depends_on:
      minio:
        condition: service_started
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: effere
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d effere"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  frontend:
    image: frontend
    build:
      context: ./Frontend
      dockerfile: ./Dockerfile
    ports:
      - "9003:80"
    depends_on:
      - backendserver

volumes:
  minio_data:
  pgdata:
