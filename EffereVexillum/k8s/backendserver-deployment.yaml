apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: backendserver
  name: backendserver
spec:
  replicas: 3
  selector:
    matchLabels:
      io.kompose.service: backendserver
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: backendserver
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - env:
            - name: Minio__AccessKey
              value: minioadmin
            - name: Minio__Endpoint
              value: minio:9000
            - name: Minio__SecretKey
              value: minioadmin
            - name: Minio__Secure
              value: "false"
          image: registry.neuhold-leonhard.work/vexillumbackend:latest
          name: backendserver
          ports:
            - containerPort: 8080
              protocol: TCP
      restartPolicy: Always
